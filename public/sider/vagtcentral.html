<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/style.css">
<style>
  * { user-select: none; -webkit-user-select: none; }
  body { display: flex; height: 100vh; overflow: hidden; background: #07090f; }

  /* Kortområde */
  .vc-map { flex: 1; position: relative; overflow: hidden; }
  canvas#kort { position: absolute; top: 0; left: 0; cursor: grab; display: block; touch-action: none; }
  canvas#kort:active { cursor: grabbing; }
  .kort-kontroller { position: absolute; bottom: 16px; left: 16px; display: flex; flex-direction: column; gap: 5px; z-index: 10; }
  .kort-knap { width: 36px; height: 36px; background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 16px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; font-family: monospace; }
  .kort-knap:hover { border-color: var(--accent); color: var(--accent); }

  .pursuit-banner {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    background: rgba(30,20,60,0.92); border-bottom: 2px solid #3b82f6;
    color: #93c5fd; font-size: 12px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; padding: 7px; text-align: center;
    display: none; animation: pulseBanner 1s infinite;
  }
  @keyframes pulseBanner { 0%,100%{border-color:#3b82f6;color:#93c5fd}50%{border-color:white;color:white} }

  /* Højre panel */
  .vc-panel { width: 320px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-tab { flex: 1; padding: 10px 4px; text-align: center; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .panel-tab.aktiv { color: var(--white); border-bottom-color: var(--accent); }

  .tab-badge { background: var(--red); color: white; font-size: 10px; border-radius: 999px; padding: 0 5px; margin-left: 4px; display: none; }
  .tab-badge.vis { display: inline; }

  .tab-indhold { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
  .tab-indhold.vis { display: flex; }

  /* Opkald liste */
  .opkald-detail-boks { padding: 10px 12px; border-bottom: 1px solid var(--border); background: rgba(26,110,245,0.07); display: none; flex-shrink: 0; }
  .opkald-detail-boks.vis { display: block; }

  .opkald-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; display: flex; align-items: center; gap: 9px; }
  .opkald-item:hover { background: var(--panel2); }
  .opkald-item.valgt { background: rgba(26,110,245,0.08); border-left: 3px solid var(--accent); padding-left: 9px; }
  .opkald-ikon { width: 30px; height: 30px; flex-shrink: 0; object-fit: contain; }
  .opkald-ikon-fb { width: 30px; height: 30px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .opkald-nr { font-size: 9px; color: var(--red); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .opkald-beskr { font-size: 12px; color: var(--white); font-weight: 600; margin: 1px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
  .opkald-lok { font-size: 10px; color: var(--muted); }
  .luk-knap { margin-left: auto; flex-shrink: 0; background: transparent; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 2px 5px; border-radius: 3px; }
  .luk-knap:hover { background: rgba(255,255,255,0.08); color: var(--white); }

  .tom-liste { padding: 24px; text-align: center; color: var(--muted); font-size: 12px; }

  /* Opret form */
  .opret-form { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
  .opret-form input, .opret-form textarea { user-select: text; -webkit-user-select: text; }
  .vc-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }

  .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .type-valg { background: var(--panel2); border: 1px solid var(--border); border-radius: 5px; padding: 7px 4px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .type-valg:hover { border-color: var(--border2); }
  .type-valg.valgt { border-color: var(--accent); background: rgba(26,110,245,0.12); }
  .type-valg img { width: 26px; height: 26px; object-fit: contain; display: block; margin: 0 auto 3px; }
  .type-valg-label { font-size: 9px; color: var(--text); line-height: 1.2; }

  /* Enheder panel */
  .enhed-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
  .enhed-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .enhed-call { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--accent2); }
  .enhed-navn { font-size: 12px; color: var(--muted); }

  .tooltip { position: fixed; background: var(--panel); border: 1px solid var(--border2); border-radius: 5px; padding: 8px 12px; pointer-events: none; z-index: 100; display: none; min-width: 140px; }
  .tooltip-call { font-size: 13px; font-weight: 700; color: var(--white); }
  .tooltip-info { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="vc-map" id="vc-map">
  <div class="pursuit-banner" id="pursuit-banner">⚠ AKTIV EFTERSÆTTELSE ⚠</div>
  <canvas id="kort"></canvas>
  <div class="kort-kontroller">
    <button class="kort-knap" onclick="zoom(1.2)">+</button>
    <button class="kort-knap" onclick="zoom(0.8)">−</button>
    <button class="kort-knap" onclick="nulstil()" style="font-size:13px;">⌂</button>
  </div>
</div>

<div class="vc-panel">
  <div class="panel-tabs">
    <div class="panel-tab aktiv" id="tab-opkald" onclick="skiftTab('opkald')">
      Opkald <span class="tab-badge" id="opkald-badge">0</span>
    </div>
    <div class="panel-tab" id="tab-opret" onclick="skiftTab('opret')">Opret</div>
    <div class="panel-tab" id="tab-enheder" onclick="skiftTab('enheder')">Enheder</div>
  </div>

  <!-- Opkald tab -->
  <div class="tab-indhold vis" id="indhold-opkald">
    <div class="opkald-detail-boks" id="valgt-detail"></div>
    <div id="opkald-liste"><div class="tom-liste">Ingen aktive opkald</div></div>
  </div>

  <!-- Opret tab -->
  <div class="tab-indhold" id="indhold-opret">
    <div class="opret-form">
      <div>
        <span class="vc-label">Hændelsestype</span>
        <div class="type-grid" id="type-grid"></div>
      </div>
      <div>
        <span class="vc-label">Beskrivelse</span>
        <input type="text" id="f-beskr" placeholder="Hvad sker der?" class="full-width">
      </div>
      <div>
        <span class="vc-label">Lokation / Postal</span>
        <input type="text" id="f-lok" placeholder="Adresse eller postal" class="full-width">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
        <button class="btn btn-outline" onclick="nulstilForm()">Ryd</button>
        <button class="btn" onclick="opretOpkald()">Opret opkald</button>
      </div>
    </div>
  </div>

  <!-- Enheder tab -->
  <div class="tab-indhold" id="indhold-enheder">
    <div id="enhed-liste"><div class="tom-liste">Indlæser...</div></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  const CAB_FARVER = {
    patrulje: '#22c55e', tilgaengelig: '#22c55e', optaget: '#eab308',
    eftersaettelse: '#3b82f6', utilgaengelig: '#ef4444',
    out_of_service: '#6c7a96', offline: '#374151'
  };

  let token = '', backendUrl = '', mig = null;
  let kortImg = null;
  let scale = 1, offX = 0, offY = 0;
  let dragging = false, lastX, lastY;
  let enhedMarkorer = [], erlcEnheder = [], cabEnheder = [];
  let pursuFrame = 0;

  // Persistente opkald — ryddes IKKE ved re-init eller tabskift
  let alleOpkald = [];
  let valgtOpkaldId = null;
  let valgtType = null;

  const IMG_SIZE = 2048;
  const SKALA = 2048 / 3072;
  const Z_OFF = -35;

  const MARKORER = [
    { id: 'bankroeveri',    label: 'Bankrøveri',    fil: 'Bankrøveri.png',    ord: ['bank'] },
    { id: 'bilsammenst',    label: 'Bilsammenstød', fil: 'Bilsammenstød.png', ord: ['sammenstød','kollision','sammenstod'] },
    { id: 'biltyveri',      label: 'Biltyveri',     fil: 'Biltyveri.png',     ord: ['biltyveri','stjålet bil'] },
    { id: 'brand',          label: 'Brand',          fil: 'Brand.png',         ord: ['brand','ild','brænder'] },
    { id: 'roeveri',        label: 'Røveri',         fil: 'Røveri.png',        ord: ['røveri','ran','overfall'] },
    { id: 'trafikstop',     label: 'Trafikstop',     fil: 'Trafikstop.png',    ord: ['trafikstop','trafik stop'] },
    { id: 'trafikuheld',    label: 'Trafikuheld',    fil: 'Trafikuheld.png',   ord: ['trafikuheld','uheld','ulykke','accident','crash'] },
  ];

  const markerImg = {};

  function verdentilPixel(lx, lz) {
    return { x: lx * SKALA, y: (lz + Z_OFF) * SKALA };
  }

  function findType(tekst = '') {
    const t = tekst.toLowerCase();
    return MARKORER.find(m => m.ord.some(o => t.includes(o))) || null;
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  let _init = false;

  async function startSide() {
    indlaesMarkerBilleder();
    byggTypeGrid();
    tilpassCanvas();
    window.addEventListener('resize', tilpassCanvas);
    opsaetMus();
    setInterval(() => { pursuFrame++; tegn(); }, 500);
    setTimeout(() => { indlaesKort(); hentData(); setInterval(hentData, 5000); }, 150);
  }

  function indlaesMarkerBilleder() {
    MARKORER.forEach(m => {
      const img = new Image();
      img.src = `/assets/markorer/${m.fil}`;
      img.onload = () => { markerImg[m.id] = img; };
    });
  }

  function byggTypeGrid() {
    document.getElementById('type-grid').innerHTML = MARKORER.map(m => `
      <div class="type-valg" id="tv-${m.id}" onclick="vaelgType('${m.id}')">
        <img src="/assets/markorer/${m.fil}" onerror="this.style.display='none'">
        <div class="type-valg-label">${m.label}</div>
      </div>`).join('');
  }

  function vaelgType(id) {
    valgtType = id;
    document.querySelectorAll('.type-valg').forEach(el => el.classList.remove('valgt'));
    document.getElementById(`tv-${id}`)?.classList.add('valgt');
  }

  // ── Kort ──────────────────────────────────────────────────────────────────────
  function tilpassCanvas() {
    const area = document.getElementById('vc-map');
    const c = document.getElementById('kort');
    c.width = area.clientWidth; c.height = area.clientHeight;
    if (kortImg) tegn();
  }

  function indlaesKort() {
    const img = new Image();
    img.src = `${backendUrl}/erlc/kort/fall_postals`;
    img.onload = () => { kortImg = img; tilpassCanvas(); nulstil(); };
    img.onerror = () => console.error('[VC] Kortbillede fejl');
  }

  function nulstil() {
    if (!kortImg) return;
    const c = document.getElementById('kort');
    scale = Math.min(c.width / IMG_SIZE, c.height / IMG_SIZE) * 0.96;
    offX = (c.width  - IMG_SIZE * scale) / 2;
    offY = (c.height - IMG_SIZE * scale) / 2;
    tegn();
  }

  function klamreOffset() {
    if (!kortImg) return;
    const c = document.getElementById('kort');
    const margin = 80;
    offX = Math.min(offX, margin); offY = Math.min(offY, margin);
    offX = Math.max(offX, c.width  - IMG_SIZE * scale - margin);
    offY = Math.max(offY, c.height - IMG_SIZE * scale - margin);
  }

  function zoom(f) {
    const c = document.getElementById('kort');
    const cx = c.width / 2, cy = c.height / 2;
    const ns = Math.max(0.15, Math.min(10, scale * f));
    offX = cx - (cx - offX) * (ns / scale);
    offY = cy - (cy - offY) * (ns / scale);
    scale = ns; klamreOffset(); tegn();
  }

  function opsaetMus() {
    const c = document.getElementById('kort');
    c.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mousemove', e => {
      if (dragging) { offX += e.clientX - lastX; offY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; klamreOffset(); tegn(); }
      else visTip(e);
    });
    window.addEventListener('mouseup', () => { dragging = false; });
    c.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = c.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const f = e.deltaY < 0 ? 1.1 : 0.9;
      const ns = Math.max(0.15, Math.min(10, scale * f));
      offX = mx - (mx - offX) * (ns / scale);
      offY = my - (my - offY) * (ns / scale);
      scale = ns; klamreOffset(); tegn();
    }, { passive: false });
  }

  function visTip(e) {
    const c = document.getElementById('kort');
    const rect = c.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const tip = document.getElementById('tooltip');
    let hit = null;
    for (const m of enhedMarkorer) {
      const sx = m.px * scale + offX, sy = m.py * scale + offY;
      if (Math.hypot(mx - sx, my - sy) < 14 * scale) { hit = m; break; }
    }
    if (hit) {
      const u = hit.unit;
      tip.innerHTML = `<div class="tooltip-call">${u.Callsign || u.Player?.split(':')[0]}</div><div class="tooltip-info">${u.Team || ''} · ${u.Location?.StreetName || ''}</div>`;
      tip.style.display = 'block'; tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 10) + 'px';
      c.style.cursor = 'pointer';
    } else {
      tip.style.display = 'none'; c.style.cursor = dragging ? 'grabbing' : 'grab';
    }
  }

  // ── Data ──────────────────────────────────────────────────────────────────────
  async function hentData() {
    try {
      const [erlcR, cabR] = await Promise.all([
        fetch(`${backendUrl}/erlc/live`, { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${backendUrl}/cab`,        { headers: { Authorization: `Bearer ${token}` } })
      ]);
      if (erlcR.ok) {
        const d = await erlcR.json();
        erlcEnheder = d.politi || [];
        // Tilføj nye ERLC opkald — overskriv IKKE eksisterende eller manuelle
        for (const o of (d.noedopkald || [])) {
          const id = String(o.CallNumber || o.opkaldsnr || '');
          if (id && !alleOpkald.find(x => x.id === id)) {
            tilfoejOpkald({
              id, kilde: 'erlc',
              beskr: o.Description || o.beskrivelse || '',
              lok: o.PositionDescriptor || o.lokation || '—',
              position: o.Position || null
            });
          }
        }
      }
      if (cabR.ok) cabEnheder = await cabR.json();
      visEnheder();
      visOpkaldListe();
      tegn();
      document.getElementById('pursuit-banner').style.display =
        cabEnheder.some(e => e.status === 'eftersaettelse') ? 'block' : 'none';
    } catch(e) { console.error('[VC] hentData:', e.message); }
  }

  function tilfoejOpkald(data) {
    const type = findType(data.beskr);
    alleOpkald.push({ ...data, type: type?.id || null, tid: new Date().toISOString() });
  }

  // ── Opkald panel ──────────────────────────────────────────────────────────────
  function visOpkaldListe() {
    const liste = document.getElementById('opkald-liste');
    const badge = document.getElementById('opkald-badge');
    if (!alleOpkald.length) {
      liste.innerHTML = '<div class="tom-liste">Ingen aktive opkald</div>';
      badge.classList.remove('vis');
      return;
    }
    badge.textContent = alleOpkald.length; badge.classList.add('vis');
    liste.innerHTML = alleOpkald.map(o => {
      const mt = MARKORER.find(m => m.id === o.type);
      const ikon = mt
        ? `<img class="opkald-ikon" src="/assets/markorer/${mt.fil}" onerror="this.outerHTML='<div class=opkald-ikon-fb>🚨</div>'">`
        : `<div class="opkald-ikon-fb">🚨</div>`;
      const nr = o.kilde === 'manuel' ? 'Manuel' : `#${o.id}`;
      return `<div class="opkald-item${o.id === valgtOpkaldId ? ' valgt' : ''}" onclick="vaelgOpkald('${o.id}')">
        ${ikon}
        <div style="flex:1;min-width:0;">
          <div class="opkald-nr">Nødopkald ${nr}</div>
          <div class="opkald-beskr">${o.beskr||'—'}</div>
          <div class="opkald-lok">📍 ${o.lok||'—'}</div>
        </div>
        <button class="luk-knap" onclick="event.stopPropagation();fjernOpkald('${o.id}')" title="Afslut opkald">✕</button>
      </div>`;
    }).join('');
  }

  function vaelgOpkald(id) {
    valgtOpkaldId = id;
    const o = alleOpkald.find(x => x.id === id);
    const boks = document.getElementById('valgt-detail');
    if (!o) { boks.classList.remove('vis'); visOpkaldListe(); return; }
    const mt = MARKORER.find(m => m.id === o.type);
    boks.classList.add('vis');
    boks.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        ${mt ? `<img src="/assets/markorer/${mt.fil}" style="width:34px;height:34px;object-fit:contain">` : '<span style="font-size:24px">🚨</span>'}
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:var(--white)">${o.beskr||'—'}</div>
          <div style="font-size:11px;color:var(--muted)">📍 ${o.lok||'—'}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        ${o.position ? `<button class="btn btn-sm btn-primary" onclick="zoomTilOpkald('${o.id}')">Vis på kort</button>` : ''}
        <button class="btn btn-sm btn-outline" onclick="fjernOpkald('${o.id}')">Afslut</button>
      </div>`;
    // Auto-zoom til kortposition
    if (o.position) zoomTilOpkald(id);
    skiftTab('opkald');
    visOpkaldListe();
  }

  function zoomTilOpkald(id) {
    const o = alleOpkald.find(x => x.id === id);
    if (!o?.position || o.position.length < 2) return;
    const { x: px, y: py } = verdentilPixel(o.position[0], o.position[1]);
    const c = document.getElementById('kort');
    scale = 3; offX = c.width / 2 - px * scale; offY = c.height / 2 - py * scale;
    klamreOffset(); tegn();
  }

  function fjernOpkald(id) {
    alleOpkald = alleOpkald.filter(x => x.id !== id);
    if (valgtOpkaldId === id) {
      valgtOpkaldId = null;
      document.getElementById('valgt-detail').classList.remove('vis');
    }
    visOpkaldListe(); tegn();
  }

  function opretOpkald() {
    const beskr = document.getElementById('f-beskr').value.trim();
    const lok   = document.getElementById('f-lok').value.trim();
    if (!beskr) { toast('Fejl', 'Udfyld beskrivelse', 'fejl'); return; }
    tilfoejOpkald({ id: `M-${Date.now()}`, kilde: 'manuel', beskr, lok, position: null });
    toast('Oprettet', 'Manuelt opkald oprettet', 'succes');
    visOpkaldListe();
    skiftTab('opkald');
    // Formfelter bevares — ryd kun ved eksplicit Ryd-klik
  }

  function nulstilForm() {
    document.getElementById('f-beskr').value = '';
    document.getElementById('f-lok').value = '';
    valgtType = null;
    document.querySelectorAll('.type-valg').forEach(el => el.classList.remove('valgt'));
  }

  function skiftTab(navn) {
    ['opkald','opret','enheder'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('aktiv', t === navn);
      document.getElementById(`indhold-${t}`).classList.toggle('vis', t === navn);
    });
  }

  // ── Enheder panel ─────────────────────────────────────────────────────────────
  function visEnheder() {
    const liste = document.getElementById('enhed-liste');
    if (!cabEnheder.length && !erlcEnheder.length) {
      liste.innerHTML = '<div class="tom-liste">Ingen aktive enheder</div>'; return;
    }
    liste.innerHTML = cabEnheder.map(e => `
      <div class="enhed-item">
        <div class="enhed-dot" style="background:${CAB_FARVER[e.status]||'#374151'}"></div>
        <div style="flex:1;min-width:0;">
          <div class="enhed-call">${e.badge_nummer||e.kaldesignal||'—'}</div>
          <div class="enhed-navn">${e.fornavn||''} ${e.efternavn||''}</div>
        </div>
      </div>`).join('');
  }

  // ── Tegn ──────────────────────────────────────────────────────────────────────
  function tegn() {
    const c = document.getElementById('kort');
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    if (!kortImg) return;
    ctx.drawImage(kortImg, offX, offY, IMG_SIZE * scale, IMG_SIZE * scale);

    enhedMarkorer = [];
    let vis = erlcEnheder.filter(u => u.Team === 'Police');
    if (!vis.length && erlcEnheder.length) {
      const civ = ['civilian','civilians','civile'];
      vis = erlcEnheder.filter(u => !civ.includes((u.Team||'').toLowerCase()));
    }

    // Politienheder — cirkler
    vis.forEach(u => {
      if (!u.Location) return;
      const { x: px, y: py } = verdentilPixel(u.Location.LocationX, u.Location.LocationZ);
      const sx = px * scale + offX, sy = py * scale + offY;
      const r = Math.max(8, 12 * scale);

      const erlcNavn = (u.Player || '').split(':')[0].toLowerCase().trim();
      const mdtBruger = cabEnheder.find(e => (e.roblox_navn||'').toLowerCase().trim() === erlcNavn);
      const erMigSelv = mig?.roblox_navn && erlcNavn === (mig.roblox_navn||'').toLowerCase().trim();
      const visCall = mdtBruger ? (mdtBruger.badge_nummer || u.Callsign) : u.Callsign;
      const cabEnhed = mdtBruger || cabEnheder.find(e => e.kaldesignal === u.Callsign);
      const status = cabEnhed?.status || 'tilgaengelig';
      const farve = CAB_FARVER[status] || '#22c55e';

      if (status === 'eftersaettelse') {
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = pursuFrame % 2 === 0 ? 'rgba(59,130,246,0.9)' : 'rgba(248,250,252,0.95)'; ctx.fill();
        ctx.strokeStyle = pursuFrame % 2 === 0 ? '#3b82f6' : 'white'; ctx.lineWidth = 2.5; ctx.stroke();
      } else {
        if (erMigSelv) {
          ctx.beginPath(); ctx.arc(sx, sy, r + 5, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2.5; ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = farve + 'cc'; ctx.fill();
        ctx.strokeStyle = farve; ctx.lineWidth = 2; ctx.stroke();
      }

      const label = visCall || u.Player?.split(':')[0] || '?';
      const fontSize = Math.max(9, Math.min(12, 10 * scale));
      ctx.font = `bold ${fontSize}px Rajdhani, sans-serif`;
      const lw = ctx.measureText(label).width + 8;
      ctx.fillStyle = 'rgba(13,18,32,0.88)';
      ctx.beginPath(); ctx.roundRect(sx - lw/2, sy - r - 16, lw, 14, 3); ctx.fill();
      ctx.fillStyle = '#cdd6f4'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(label, sx, sy - r - 5);
      ctx.font = `bold ${Math.max(8, 10 * scale)}px Rajdhani, sans-serif`;
      ctx.fillStyle = 'white'; ctx.textBaseline = 'middle';
      ctx.fillText(label.replace(/[^a-zA-Z0-9]/g, '').slice(-2) || '?', sx, sy);
      ctx.textBaseline = 'alphabetic';

      enhedMarkorer.push({ px, py, unit: u });
    });

    // Aktive opkald — PNG markør eller fallback
    alleOpkald.forEach(o => {
      if (!o.position || o.position.length < 2) return;
      const { x: px, y: py } = verdentilPixel(o.position[0], o.position[1]);
      const sx = px * scale + offX, sy = py * scale + offY;
      const mt = MARKORER.find(m => m.id === o.type);
      const erValgt = o.id === valgtOpkaldId;
      const puls = erValgt ? (0.88 + 0.12 * Math.sin(Date.now() / 250)) : 1;

      if (mt && markerImg[mt.id]) {
        const mSz = 44 * scale * puls;
        // Skygge
        ctx.beginPath(); ctx.ellipse(sx, sy + 2, mSz / 3.5, mSz / 9, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
        // PNG billede (ankret til bund-midten)
        ctx.drawImage(markerImg[mt.id], sx - mSz / 2, sy - mSz, mSz, mSz);
        // Label
        const tekst = (o.lok || mt.label).slice(0, 22);
        ctx.font = `bold 10px Rajdhani, sans-serif`;
        const tw = ctx.measureText(tekst).width + 10;
        ctx.fillStyle = erValgt ? 'rgba(26,110,245,0.9)' : 'rgba(20,20,20,0.82)';
        ctx.beginPath(); ctx.roundRect(sx - tw / 2, sy - mSz - 14, tw, 13, 3); ctx.fill();
        ctx.fillStyle = erValgt ? '#fff' : '#cdd6f4';
        ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(tekst, sx, sy - mSz - 3);
      } else {
        // Fallback: gul puls
        const pr = (22 + 4 * Math.sin(Date.now() / 300)) * scale;
        ctx.beginPath(); ctx.arc(sx, sy, pr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(234,179,8,0.15)'; ctx.fill();
        ctx.strokeStyle = 'rgba(234,179,8,0.5)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.beginPath(); ctx.arc(sx, sy, 13, 0, Math.PI * 2);
        ctx.fillStyle = '#eab308'; ctx.fill();
        ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#000'; ctx.font = 'bold 13px Rajdhani, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('!', sx, sy); ctx.textBaseline = 'alphabetic';
      }
    });
  }

  // ── PostMessage ───────────────────────────────────────────────────────────────
  window.addEventListener('message', e => {
    const m = e.data || {};
    if (m.type === 'init' && m.token) {
      const first = !_init;
      token = m.token; backendUrl = m.backend !== undefined ? m.backend : ''; mig = m.bruger || null;
      if (first) { _init = true; startSide(); }
      // alleOpkald og formfelter ryddes IKKE ved re-init
    }
    if (m.type === 'nyt_noedopkald' && m.data) {
      const o = m.data;
      const id = String(o.id || o.opkaldsnr || Date.now());
      if (!alleOpkald.find(x => x.id === id)) {
        tilfoejOpkald({ id, kilde: 'erlc', beskr: o.beskrivelse || '', lok: o.lokation || '—', position: o.position || null });
        visOpkaldListe(); tegn();
      }
    }
    if (m.type === 'cab_opdatering') { hentData(); }
  });
  window.parent.postMessage({ type: 'klar' }, '*');
  setTimeout(() => { if (!_init) { try { token = window.parent.token || ''; backendUrl = ''; } catch{} if (token) { _init = true; startSide(); } } }, 800);
  function toast(t, x, k) { try { window.parent.postMessage({ type: 'toast', data: { titel: t, tekst: x, klasse: k } }, '*'); } catch{} }
</script>
</body>
</html>
