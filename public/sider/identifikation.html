<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="/style.css">
<style>
body { display: grid; grid-template-columns: 320px 1fr; height: 100vh; overflow: hidden; background: var(--bg); }

.liste-side { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.liste-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
.liste-header h2 { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); flex: 1; }
.liste-scroll { overflow-y: auto; flex: 1; }

.id-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; display: flex; gap: 10px; align-items: center; }
.id-item:hover { background: var(--panel2); }
.id-item.valgt { background: rgba(99,179,237,0.06); border-left: 3px solid var(--accent); }
.id-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--panel2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.id-navn { font-size: 13px; font-weight: 600; color: var(--white); }
.id-cpr { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
.id-user { font-size: 11px; color: var(--muted2); margin-top: 1px; }

.hoved-side { display: flex; flex-direction: column; overflow: hidden; }
.hoved-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
.hoved-header h2 { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); flex: 1; }
.hoved-scroll { overflow-y: auto; flex: 1; padding: 24px; max-width: 700px; margin: 0 auto; width: 100%; box-sizing: border-box; }

.tom-valg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--muted); }
.tom-valg-ikon { font-size: 52px; opacity: 0.2; }

/* ID-kort visning */
.id-kort { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.id-kort-header { padding: 16px 20px; background: var(--politi-navy, #0a1628); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.id-kort-titel { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.id-kort-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

.id-felt { }
.id-felt label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 6px; }
.id-felt .vis-val { font-size: 16px; color: var(--white); font-weight: 600; }
.id-felt .cpr-val { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--accent); font-weight: 700; letter-spacing: 2px; }

/* Rediger formular */
.rediger-kort { background: var(--panel); border: 1px solid var(--accent, #63b3ed); border-radius: 12px; overflow: hidden; }
.rediger-header { padding: 12px 20px; background: rgba(99,179,237,0.08); border-bottom: 1px solid rgba(99,179,237,0.2); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent, #63b3ed); display: flex; align-items: center; justify-content: space-between; }
.rediger-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.rf label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 5px; }
.rf input, .rf select, .rf textarea { width: 100%; box-sizing: border-box; background: var(--panel2); border: 1px solid var(--border2, #2d3a50); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 13px; padding: 7px 10px; border-radius: 5px; outline: none; transition: border-color 0.15s; }
.rf input:focus, .rf select:focus { border-color: var(--accent); }
.rf input.ro { opacity: 0.55; }

.adgang-fejl { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--muted); }
</style>
</head>
<body>

<!-- LISTE -->
<div class="liste-side">
  <div class="liste-header">
    <h2>ID-Kort</h2>
    <input type="text" style="flex:1;background:var(--panel2);border:1px solid var(--border2);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;padding:5px 8px;border-radius:4px;outline:none;" placeholder="Søg navn / CPR / username..." oninput="filterListe(this.value)" id="soeg-input">
    <button class="btn btn-sm" onclick="hentAlle()">↻</button>
  </div>
  <div class="liste-scroll" id="liste">
    <div style="padding:20px;text-align:center;color:var(--muted)">Indlæser...</div>
  </div>
</div>

<!-- HOVED -->
<div class="hoved-side">
  <div class="hoved-header">
    <h2 id="hoved-titel">Identifikationskort</h2>
    <span id="hoved-antal" style="font-size:11px;color:var(--muted);"></span>
  </div>
  <div class="hoved-scroll" id="hoved-indhold">
    <div class="tom-valg">
      <div class="tom-valg-ikon">🪪</div>
      <p>Vælg et ID-kort fra listen</p>
    </div>
  </div>
</div>

<script>
const ADMIN_USER_ID = '623033555345342484';
let token='', backendUrl='', mig=null;
let alleKort=[], filtreretKort=[];
let aktivTråd=null;

async function startSide() {
  // Tjek admin adgang — tillad dit discord ID eller er_admin
  const harAdgang = mig?.discord_id === ADMIN_USER_ID
    || String(mig?.discord_id) === ADMIN_USER_ID
    || mig?.er_admin === 1
    || mig?.er_admin === true;

  if (!harAdgang) {
    document.getElementById('hoved-indhold').innerHTML = `
      <div class="adgang-fejl">
        <div style="font-size:48px;opacity:0.2;">🔒</div>
        <p>Kun administratorer har adgang til dette dashboard</p>
        <p style="font-size:11px;color:var(--muted2);">Din Discord ID: ${mig?.discord_id || 'ukendt'}</p>
      </div>`;
    document.getElementById('liste').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">Ingen adgang</div>';
    return;
  }
  await hentAlle();
}

async function hentAlle() {
  document.getElementById('liste').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">Henter ID-kort fra Discord...</div>';
  try {
    const r = await fetch(`${backendUrl}/data/identifikation-alle`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) throw new Error('Fejl');
    alleKort = await r.json();
    filtreretKort = alleKort;
    visListe(filtreretKort);
    document.getElementById('hoved-antal').textContent = `${alleKort.length} kort`;
  } catch {
    document.getElementById('liste').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">Kunne ikke hente ID-kort</div>';
  }
}

function filterListe(q) {
  const fl = q.toLowerCase();
  filtreretKort = alleKort.filter(k =>
    k.navn?.toLowerCase().includes(fl) ||
    k.cpr?.toLowerCase().includes(fl) ||
    k.username?.toLowerCase().includes(fl)
  );
  visListe(filtreretKort);
}

function visListe(kort) {
  const el = document.getElementById('liste');
  if (!kort.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted)">Ingen resultater</div>';
    return;
  }
  el.innerHTML = kort.map(k => `
    <div class="id-item" onclick="visKort('${k.tråd_id}', this)">
      <div class="id-avatar">${(k.navn||k.username||'?')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="id-navn">${k.navn || '—'}</div>
        <div class="id-cpr">${k.cpr || '—'}</div>
        <div class="id-user">${k.username || ''}</div>
      </div>
    </div>`).join('');
}

function visKort(trådId, el) {
  document.querySelectorAll('.id-item').forEach(i => i.classList.remove('valgt'));
  if (el) el.classList.add('valgt');

  const k = alleKort.find(x => x.tråd_id === trådId);
  if (!k) return;
  aktivTråd = trådId;

  document.getElementById('hoved-indhold').innerHTML = `
    <div class="id-kort">
      <div class="id-kort-header">
        <div style="flex:1">
          <div class="id-kort-titel">Identifikationskort</div>
          <div style="font-size:12px;color:var(--muted2);margin-top:3px;">${k.username || '—'}</div>
        </div>
      </div>
      <div class="id-kort-body">
        <div class="id-felt"><label>Navn</label><div class="vis-val">${k.navn || '—'}</div></div>
        <div class="id-felt"><label>CPR-Nummer</label><div class="cpr-val">${k.cpr || '—'}</div></div>
        <div class="id-felt"><label>Køn</label><div class="vis-val">${k.kon || 'Mand'}</div></div>
        <div class="id-felt"><label>Adresse</label><div class="vis-val">${k.adresse || 'Hjemløs'}</div></div>
      </div>
    </div>

    <div class="rediger-kort">
      <div class="rediger-header">
        Rediger ID-kort
        <button class="btn btn-sm btn-primary" onclick="gemRedigering('${trådId}')">Gem og opdater Discord</button>
      </div>
      <div class="rediger-body">
        <div class="rf"><label>Navn</label><input type="text" id="red-navn" value="${k.navn || ''}"></div>
        <div class="rf"><label>CPR-Nummer <span style="font-size:9px;color:var(--muted2);font-weight:400;">(ændres normalt ikke)</span></label><input type="text" id="red-cpr" value="${k.cpr || ''}" class="ro" readonly></div>
        <div class="rf"><label>Køn</label>
          <select id="red-kon">
            <option value="Mand" ${(k.kon||'Mand')==='Mand'?'selected':''}>Mand</option>
            <option value="Kvinde" ${k.kon==='Kvinde'?'selected':''}>Kvinde</option>
            <option value="Ukendt" ${k.kon==='Ukendt'?'selected':''}>Ukendt</option>
          </select>
        </div>
        <div class="rf"><label>Adresse</label><input type="text" id="red-adresse" value="${k.adresse || 'Hjemløs'}"></div>
      </div>
    </div>`;
}

async function gemRedigering(trådId) {
  const navn    = document.getElementById('red-navn')?.value.trim();
  const kon     = document.getElementById('red-kon')?.value;
  const adresse = document.getElementById('red-adresse')?.value.trim();
  const k       = alleKort.find(x => x.tråd_id === trådId);
  if (!k) return;

  const knap = document.querySelector('.rediger-header .btn-primary');
  if (knap) { knap.disabled = true; knap.textContent = 'Gemmer...'; }

  try {
    const r = await fetch(`${backendUrl}/data/identifikation/${trådId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ navn, kon, adresse, discord_id: k.discord_id })
    });
    if (r.ok) {
      toast('Gemt', `${navn} — Discord opdateret`, 'succes');
      // Opdater lokalt
      k.navn = navn; k.kon = kon; k.adresse = adresse;
      visListe(filtreretKort);
      visKort(trådId, document.querySelector('.id-item.valgt'));
    } else {
      const err = await r.json();
      toast('Fejl', err.fejl || 'Ukendt fejl', 'fejl');
    }
  } catch { toast('Fejl', 'Serverfejl', 'fejl'); }

  if (knap) { knap.disabled = false; knap.textContent = 'Gem og opdater Discord'; }
}

// POSTMESSAGE
let _init = false;
window.addEventListener('message', e => {
  const m = e.data || {};
  if (m.type === 'init' && m.token) {
    token = m.token; backendUrl = m.backend !== undefined ? m.backend : ''; mig = m.bruger || null;
    if (!_init) { _init = true; startSide(); }
  }
});
window.parent.postMessage({ type: 'klar' }, '*');
setTimeout(() => { if (!_init) { try { token=window.parent.token||''; backendUrl = ''; mig=window.parent._mdtBruger||null; } catch{} if (token) { _init=true; startSide(); } } }, 800);
function toast(t,x,k) { try { window.parent.postMessage({type:'toast',data:{titel:t,tekst:x,klasse:k}},'*'); } catch{} }
</script>
</body>
</html>
